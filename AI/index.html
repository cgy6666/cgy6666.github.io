<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手 (GPT-4o)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f0f2f5;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .chat-container {
            height: 700px;
            background: #fff;
            border-radius: 15px;
            padding: 25px;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .message {
            margin-bottom: 18px;
            padding: 12px 18px;
            border-radius: 10px;
            max-width: 75%;
            line-height: 1.6;
        }
        .user {
            background: #0095f6;
            color: white;
            margin-left: auto;
        }
        .ai {
            background: #e5e5ea;
            color: #333;
            margin-right: auto;
            white-space: pre-wrap;
        }
        .input-area {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        #input {
            flex: 1;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }
        #input:focus {
            border-color: #0095f6;
        }
        #send {
            padding: 15px 25px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
        #send:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .loading {
            color: #666;
            font-style: italic;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chat"></div>
    <div class="input-area">
        <input type="text" id="input" placeholder="请输入你的问题（GPT-4o）..." autocomplete="off">
        <button id="send">发送</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const send = document.getElementById('send');
        // 对话上下文（支持上下文记忆）
        let messages = [];

        // 发送按钮/回车触发
        send.addEventListener('click', sendMessage);
        input.addEventListener('keydown', e => e.key === 'Enter' && sendMessage());

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // 追加用户消息
            addMessage(text, 'user');
            input.value = '';
            send.disabled = true;

            // 加入对话上下文
            messages.push({ role: 'user', content: text });

            // 加载提示
            const loading = addLoading();

            try {
                // ==============================================
                // 标准 OpenAI 接口 + GPT-4o 模型
                // ==============================================
                const res = await fetch('https://ai.luogu.me/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: "gpt-4o",  // ✅ 已修改为 GPT-4o
                        messages: messages,
                        temperature: 0.7
                    })
                });

                const data = await res.json();
                chat.removeChild(loading);

                // 获取AI回复
                const reply = data.choices[0].message.content;
                messages.push({ role: 'assistant', content: reply });
                addMessage(reply, 'ai');

            } catch (err) {
                chat.removeChild(loading);
                addMessage('AI 调用失败，请稍后重试', 'ai');
                console.error(err);
            }

            send.disabled = false;
        }

        // 添加消息到页面
        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // 加载中提示
        function addLoading() {
            const div = document.createElement('div');
            div.className = 'loading';
            div.textContent = 'GPT-4o 思考中...';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT-4o AI 助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f0f2f5;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .api-key-box {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        #apiKey {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        #apiKey:focus {
            border-color: #0095f6;
        }
        .chat-container {
            height: 600px;
            background: #fff;
            border-radius: 15px;
            padding: 25px;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .message {
            margin-bottom: 18px;
            padding: 12px 18px;
            border-radius: 10px;
            max-width: 75%;
            line-height: 1.6;
        }
        .user {
            background: #0095f6;
            color: white;
            margin-left: auto;
        }
        .ai {
            background: #e5e5ea;
            color: #333;
            margin-right: auto;
            white-space: pre-wrap;
        }
        .input-area {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        #input {
            flex: 1;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }
        #input:focus {
            border-color: #0095f6;
        }
        #send {
            padding: 15px 25px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
        #send:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .loading {
            color: #666;
            font-style: italic;
            padding: 10px;
        }
        .tip {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="tip">请先输入 API Key（令牌），自动保存，仅需输入一次</div>
    <div class="api-key-box">
        <input type="password" id="apiKey" placeholder="请输入你的 API Key 令牌">
    </div>

    <div class="chat-container" id="chat"></div>
    <div class="input-area">
        <input type="text" id="input" placeholder="向 GPT-4o 提问..." autocomplete="off">
        <button id="send">发送</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const send = document.getElementById('send');
        const apiKeyInput = document.getElementById('apiKey');
        let messages = [];

        // 自动加载本地保存的 API Key
        window.onload = () => {
            const savedKey = localStorage.getItem('ai_api_key');
            if (savedKey) apiKeyInput.value = savedKey;
        };

        // 绑定事件
        send.addEventListener('click', sendMessage);
        input.addEventListener('keydown', e => e.key === 'Enter' && sendMessage());
        apiKeyInput.addEventListener('change', saveApiKey);

        // 保存 API Key 到本地
        function saveApiKey() {
            localStorage.setItem('ai_api_key', apiKeyInput.value.trim());
        }

        async function sendMessage() {
            const text = input.value.trim();
            const apiKey = apiKeyInput.value.trim();
            
            if (!apiKey) {
                alert('请先输入 API Key 令牌！');
                return;
            }
            if (!text) return;

            // 保存 Key
            saveApiKey();

            // 显示用户消息
            addMessage(text, 'user');
            input.value = '';
            send.disabled = true;
            messages.push({ role: 'user', content: text });

            // 加载中
            const loading = addLoading();

            try {
                // ==============================================
                // 标准 OpenAI GPT-4o + 令牌鉴权
                // ==============================================
                const res = await fetch('https://ai.luogu.me/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}` // 核心：带上令牌
                    },
                    body: JSON.stringify({
                        model: "gpt-4o",
                        messages: messages,
                        temperature: 0.7
                    })
                });

                const data = await res.json();
                chat.removeChild(loading);

                // 错误处理
                if (data.error) {
                    addMessage(`错误：${data.error.message}`, 'ai');
                    return;
                }

                const reply = data.choices[0].message.content;
                messages.push({ role: 'assistant', content: reply });
                addMessage(reply, 'ai');

            } catch (err) {
                chat.removeChild(loading);
                addMessage('请求失败，请检查令牌/网络', 'ai');
                console.error(err);
            }

            send.disabled = false;
        }

        // 消息渲染
        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function addLoading() {
            const div = document.createElement('div');
            div.className = 'loading';
            div.textContent = 'GPT-4o 思考中...';
            chat.appendChild(div);
            return div;
        }
    </script>
</body>
</html>
